name: Publish VAFPQR Android v0.1.0

on:
  push:
    tags:
      - mobile-v0.1.0

permissions:
  contents: write

jobs:
  publish-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Download final EAS APK
        env:
          APK_URL: https://expo.dev/artifacts/eas/cf-0P1lc1esYIeVjOKzEA5o74AN7ItYE87jpmnhekMU.apk
        run: curl --fail --location "$APK_URL" --output VAFPQR-android-v0.1.0.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          VAFPQR-android-v0.1.0.apk
          --title "VAFPQR Android v0.1.0"
          --notes "Final Android preview APK for the ICT302 VAFPQR client demonstration."
